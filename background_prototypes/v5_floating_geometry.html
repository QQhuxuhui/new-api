<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 5: Floating Geometry</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f9fafb; /* Very light gray */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            animation: float-rotate 20s infinite linear;
        }

        /* Triangle */
        .shape-triangle {
            width: 0;
            height: 0;
            background: transparent;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid rgba(255, 230, 230, 0.3);
            backdrop-filter: none;
            box-shadow: none;
            top: 20%;
            left: 20%;
            animation-duration: 25s;
        }

        /* Circle */
        .shape-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            top: 60%;
            left: 70%;
            background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(230,240,255,0.4));
            animation-duration: 30s;
            animation-direction: reverse;
        }

        /* Square */
        .shape-square {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            top: 70%;
            left: 15%;
            background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(240,255,230,0.4));
            animation-duration: 40s;
        }

        /* Donut */
        .shape-donut {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 20px solid rgba(240, 230, 255, 0.3);
            background: transparent;
            top: 15%;
            right: 15%;
            animation-duration: 35s;
        }

        @keyframes float-rotate {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(30px, -50px) rotate(120deg);
            }
            66% {
                transform: translate(-20px, 40px) rotate(240deg);
            }
            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="shape shape-triangle"></div>
    <div class="shape shape-circle"></div>
    <div class="shape shape-square"></div>
    <div class="shape shape-donut"></div>

    <div class="content">
        <h1>New API</h1>
        <p>Structured Elegance</p>
    </div>
</body>
</html>
