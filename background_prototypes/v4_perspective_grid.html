<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 4: Perspective Grid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            perspective: 600px; /* Creates 3D space */
        }

        .grid-container {
            position: absolute;
            width: 200%;
            height: 200%;
            left: -50%;
            top: -50%;
            transform: rotateX(60deg); /* Tilt the plane */
            background-image: 
                linear-gradient(to right, rgba(200, 200, 200, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(200, 200, 200, 0.3) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: moveGrid 15s linear infinite;
        }

        /* Fade out towards the top/horizon */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ffffff 20%, rgba(255,255,255,0) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .content {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #111;
        }

        @keyframes moveGrid {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 0 80px; /* Should match background-size height */
            }
        }
    </style>
</head>
<body>
    <div class="grid-container"></div>
    <div class="vignette"></div>

    <div class="content">
        <h1>New API</h1>
        <p>Infinite Scalability</p>
    </div>
</body>
</html>
