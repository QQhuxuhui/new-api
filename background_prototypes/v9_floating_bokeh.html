<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 9: Parallax Bokeh</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #222;
        }
    </style>
</head>
<body>
    <canvas id="canvas-container"></canvas>
    
    <div class="content">
        <h1>New API</h1>
        <p>Depth & Focus</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let width, height;

        const orbs = [];
        const numOrbs = 50;

        class Orb {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                // Z-index simulates depth (0.1 = far, 1.0 = close)
                this.z = Math.random() * 0.8 + 0.2; 
                this.radius = Math.random() * 50 * this.z + 10;
                this.vx = (Math.random() - 0.5) * 0.5 * this.z;
                this.vy = (Math.random() - 0.5) * 0.5 * this.z;
                
                // Color palette: soft blues, purples, grays
                const colors = [
                    `rgba(147, 197, 253, ${0.1 * this.z})`, // Blue 300
                    `rgba(196, 181, 253, ${0.1 * this.z})`, // Violet 300
                    `rgba(203, 213, 225, ${0.15 * this.z})` // Slate 300
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Outline only vs Filled
                this.filled = Math.random() > 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Gentle wrapping with buffer
                const buffer = 100;
                if (this.x > width + buffer) this.x = -buffer;
                if (this.x < -buffer) this.x = width + buffer;
                if (this.y > height + buffer) this.y = -buffer;
                if (this.y < -buffer) this.y = height + buffer;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                if (this.filled) {
                    ctx.fillStyle = this.color;
                    ctx.fill();
                } else {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2 * this.z; // Thicker lines for closer objects
                    ctx.stroke();
                }
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            orbs.length = 0;
            for (let i = 0; i < numOrbs; i++) {
                orbs.push(new Orb());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Optional: Mouse parallax could be added here
            
            orbs.forEach(orb => {
                orb.update();
                orb.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
