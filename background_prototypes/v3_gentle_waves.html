<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 3: Gentle Waves</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #333;
        }
        
        h1 {
            font-weight: 300;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-container"></canvas>
    
    <div class="content">
        <h1>New API</h1>
        <p>Seamless Integration</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let width, height;

        // Wave settings
        const waves = [
            { y: 0.5, amplitude: 30, length: 0.01, speed: 0.02, color: 'rgba(59, 130, 246, 0.05)' }, // Blue-ish
            { y: 0.5, amplitude: 50, length: 0.008, speed: 0.015, color: 'rgba(168, 85, 247, 0.05)' }, // Purple-ish
            { y: 0.55, amplitude: 40, length: 0.015, speed: 0.01, color: 'rgba(14, 165, 233, 0.05)' }  // Cyan-ish
        ];

        let increment = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            increment += 0.01;

            waves.forEach(wave => {
                ctx.beginPath();
                ctx.moveTo(0, height * wave.y);

                for (let i = 0; i < width; i++) {
                    // Sine wave formula: y = amplitude * sin(x * length + offset)
                    const y = (height * wave.y) + 
                              Math.sin(i * wave.length + increment * (wave.speed * 100)) * wave.amplitude * Math.sin(increment);
                    ctx.lineTo(i, y);
                }

                // Close the path to fill the bottom
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.fillStyle = wave.color;
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
