<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 3-B: Iridescent Silk Threads</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: #333;
            /* Optional: Add a subtle backdrop for text readability if threads cross it */
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        
        h1 {
            font-weight: 300;
            font-size: 3rem;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <canvas id="canvas-container"></canvas>
    
    <div class="content">
        <h1>New API</h1>
        <p>Silky Smooth Performance</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let width, height;

        // Configuration
        const threadCount = 40; // Number of lines
        const waveSpeed = 0.005; // How fast they move
        const amplitudeBase = 40; // Height of waves
        
        // Generate static properties for threads
        const threads = [];
        
        function initThreads() {
            threads.length = 0; // Clear array
            for (let i = 0; i < threadCount; i++) {
                threads.push({
                    // Y position centered but spread out slightly
                    yOffset: 0.5 + (Math.random() - 0.5) * 0.2, 
                    // Each thread has a slightly different wave frequency
                    length: 0.005 + Math.random() * 0.005,
                    // Slightly different amplitude
                    amplitude: amplitudeBase + Math.random() * 20,
                    // Speed variation
                    speed: waveSpeed + Math.random() * 0.002,
                    // Phase offset so they don't all start same
                    phase: Math.random() * Math.PI * 2,
                    // Color: Cycle through 360 degrees of hue
                    // High Lightness (80-90%) for "faint/pastel" look
                    // Low to Medium Saturation (50-70%)
                    color: `hsla(${i * (360 / threadCount)}, 70%, 85%, 0.5)` 
                });
            }
        }

        let increment = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initThreads(); // Re-init to adjust distribution if needed
        }

        function animate() {
            // Using a slight fade effect instead of clearRect creates tails/motion blur, 
            // but for clean silk look, clearRect is better.
            ctx.clearRect(0, 0, width, height);

            increment += 1;

            threads.forEach((thread, i) => {
                ctx.beginPath();
                
                // Draw the wave
                for (let x = 0; x <= width; x += 10) { // Step by 10px for performance
                    const yBase = height * thread.yOffset;
                    
                    // Complex wave function: Main wave + smaller secondary wave for detail
                    const y = yBase + 
                              Math.sin(x * thread.length + increment * thread.speed + thread.phase) * thread.amplitude +
                              Math.sin(x * (thread.length * 2) + increment * (thread.speed * 1.5)) * (thread.amplitude * 0.2);

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.strokeStyle = thread.color;
                ctx.lineWidth = 1.5; // Fine lines
                // Smooth line joins
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        initThreads(); // Initial setup
        animate();
    </script>
</body>
</html>
