<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SparkCode · 对话生图</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ===========================================
       宋韵 · 朱砂 × 宣纸
       Song Dynasty refined — rice paper + cinnabar
       =========================================== */
    :root {
      /* Surfaces */
      --bg:           #faf6ee;   /* 宣纸底 */
      --bg-2:         #f5efde;   /* 略深 */
      --paper:        #ffffff;   /* 纯白卡 */
      --paper-warm:   #fdfaf3;   /* 微暖白 */

      /* Ink */
      --ink:          #1a1814;   /* 墨黑 */
      --ink-soft:     #4a4338;   /* 淡墨 */
      --muted:        #7a7268;   /* 灰墨 */
      --faint:        #b3a99a;   /* 淡灰 */

      /* Borders */
      --border:       #e6dec8;   /* 暖边 */
      --border-soft:  #f0e9d5;
      --border-strong:#cfc4a5;

      /* 朱砂 cinnabar — the one signature color */
      --accent:       #a82828;
      --accent-2:     #c0392b;
      --accent-deep:  #7a1c1c;
      --accent-tint:  rgba(168,40,40,0.06);
      --accent-tint-2:rgba(168,40,40,0.14);

      /* Status */
      --success:      #5a7a3a;
      --warn:         #b8860b;
      --error:        #a82828;

      /* Aliases for legacy `var(--text)` / `var(--panel)` references */
      --text:         var(--ink);
      --panel:        var(--paper);

      /* Typography */
      --font-display: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "STZhongsong", "SimSun", serif;
      --font-body:    -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      --font-mono:    "SF Mono", "JetBrains Mono", Consolas, "Courier New", monospace;

      /* Shadows (warm, soft — never neutral grey) */
      --shadow-paper: 0 1px 0 rgba(80,50,20,0.04), 0 8px 24px rgba(80,50,20,0.06);
      --shadow-modal: 0 4px 12px rgba(80,50,20,0.10), 0 24px 64px rgba(80,50,20,0.14);
      --shadow-img:   0 1px 2px rgba(80,50,20,0.06), 0 4px 12px rgba(80,50,20,0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "palt" 1;
    }

    /* 宣纸纹理：极细噪点 + 朱砂角光晕 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(at 0% 0%, rgba(168,40,40,0.025) 0%, transparent 45%),
        radial-gradient(at 100% 100%, rgba(80,50,20,0.025) 0%, transparent 55%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.42  0 0 0 0 0.34  0 0 0 0 0.18  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      background-size: auto, auto, 180px 180px;
    }

    /* Layout shell */
    .app { display: grid; grid-template-rows: 64px 1fr; height: 100vh; position: relative; z-index: 1; }
    .main { display: grid; grid-template-columns: 440px 1fr; min-height: 0; }

    /* === 题首 (header) === */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 24px;
      background: var(--paper-warm);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    /* 朱砂装订线 */
    .header::after {
      content: '';
      position: absolute; bottom: -1px; left: 24px; right: 24px;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 18%, var(--accent) 82%, transparent 100%);
      opacity: 0.45;
    }

    .brand {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: var(--font-body);
      font-size: 19px; font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.2px;
    }
    /* "Spark" 和 "Code" 一暖一冷，强化品牌辨识度 */
    .brand::after {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin-left: 2px;
      transform: translateY(6px);
    }
    /* 印章式 logo —「图」字朱砂方印，略向左倾 */
    .brand-seal {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      border-radius: 4px;
      box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.18), 0 1px 2px rgba(120,20,20,0.25);
      transform: rotate(-4deg);
      letter-spacing: 0;
    }

    .brand-status {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0;
      font-weight: 400;
    }

    /* Header buttons (toolbar, all unified) */
    .header button {
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink-soft);
      font-family: var(--font-body);
      font-size: 12.5px;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }
    .header button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--paper-warm);
    }
    .header select {
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 12.5px;
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      min-width: 200px;
    }
    .header select:hover { border-color: var(--accent); }

    /* === Chat 左栏 === */
    .chat-pane {
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
      background: var(--paper-warm);
    }
    .chat-stream { flex: 1; overflow-y: auto; padding: 24px 20px; }

    /* Composer toolbar (model picker + new-chat — sits between stream and input) */
    .composer-toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      background: var(--paper-warm);
      border-top: 1px solid var(--border);
    }
    .composer-toolbar-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      font-weight: 500;
    }
    .composer-toolbar select {
      flex: 0 1 auto;
      min-width: 220px;
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .composer-toolbar select:hover { border-color: var(--accent); }
    .composer-newchat {
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink-soft);
      font-family: var(--font-body);
      font-size: 12.5px;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }
    .composer-newchat:hover { border-color: var(--accent); color: var(--accent); }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 14px 20px 18px;
      background: var(--paper);
    }

    /* === Workspace 右栏 === */
    .workspace {
      display: flex; flex-direction: column;
      min-height: 0;
      background: var(--bg);
    }

    /* Tabs — 装订线式 (no pill, just a baseline) */
    .tab-bar {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: var(--paper-warm);
    }
    .tab {
      padding: 14px 22px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-family: var(--font-display);
      color: var(--muted);
      letter-spacing: 2px;
      position: relative;
      transition: color 0.15s ease;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      color: var(--accent);
      font-weight: 600;
    }
    .tab.active::after {
      content: '';
      position: absolute; left: 14px; right: 14px; bottom: -1px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }
    .tab-content { flex: 1; overflow: auto; padding: 24px; }

    /* === Toast 便签 === */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--paper);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--ink);
      z-index: 9999; opacity: 0;
      box-shadow: var(--shadow-paper);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* === Scrollbar (warm, thin) === */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Common reusable classes (used by JS-rendered content) */
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 0;
      font-family: var(--font-body);
      padding: 9px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 1px 2px rgba(120,20,20,0.18);
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .btn-primary:hover { background: var(--accent-deep); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { background: var(--faint); cursor: not-allowed; box-shadow: none; }

    .btn-ghost {
      background: var(--paper);
      color: var(--ink-soft);
      border: 1px solid var(--border);
      font-family: var(--font-body);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Upload button — visually inviting, dashed border to read as a "drop zone" */
    .btn-upload {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-tint);
      color: var(--accent);
      border: 1.5px dashed var(--accent-tint-2);
      font-family: var(--font-body);
      font-size: 12.5px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }
    .btn-upload:hover {
      background: var(--accent-tint-2);
      border-color: var(--accent);
      border-style: solid;
    }

    /* Form controls when used in modals */
    .field-input, .field-select, .field-textarea {
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 4px;
      transition: border-color 0.15s ease;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-tint);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="brand">
        <span class="brand-seal">图</span>
        SparkCode
      </span>
      <span class="brand-status" id="header-status">初始化…</span>
      <span style="margin-left:auto"></span>
      <button id="settings-btn" title="管理 API Key">⚙ 令牌</button>
      <button id="export-btn">⬇ 导出</button>
      <button id="import-btn">⬆ 导入</button>
    </header>
    <main class="main">
      <section class="chat-pane">
        <div class="chat-stream" id="chat-stream"></div>
        <div class="composer-toolbar">
          <label class="composer-toolbar-label">模型</label>
          <select id="model-select"></select>
          <span style="margin-left:auto"></span>
          <button id="new-chat-btn" class="composer-newchat">+ 新对话</button>
        </div>
        <div class="input-area" id="input-area"></div>
      </section>
      <section class="workspace">
        <div class="tab-bar" id="tab-bar"></div>
        <div class="tab-content" id="tab-content"></div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script type="module">
    const { openDB } = window.idb;

    // === Constants ===
    const API_BASE      = 'https://api.sparkcode.top/v1';
    const DB_NAME       = 'convImageStudio';
    const DB_VERSION    = 1;
    const IMAGE_CAPACITY = 200;
    const STYLE_PRESETS = [
      '写实摄影','日漫风','赛博朋克','极简线稿','油画质感','国风水墨',
      'Pixar 3D','霓虹噪点','雾面胶片','等距插画','金属反光','黏土玩偶',
    ];

    // === IndexedDB layer ===
    let db;
    async function initDB() {
      db = await openDB(DB_NAME, DB_VERSION, {
        upgrade(d) {
          d.createObjectStore('images',   { keyPath: 'id' });
          d.createObjectStore('messages', { keyPath: 'id' });
          d.createObjectStore('nodes',    { keyPath: 'id' });
          // backup table created lazily by import flow
        }
      });
    }

    // === Helpers ===
    const $ = id => document.getElementById(id);
    const uuid = () => crypto.randomUUID();
    const now  = () => Date.now();
    function toast(msg, ms = 2500) {
      const el = $('toast'); el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), ms);
    }

    // === Short-ID allocator (g1/g2.../u1/u2... per type) ===
    async function nextShortId(prefix) {
      const tx = db.transaction('images', 'readonly');
      let max = 0;
      for await (const cursor of tx.store) {
        const sid = cursor.value.shortId || '';
        if (sid.startsWith(prefix)) {
          const n = parseInt(sid.slice(prefix.length), 10);
          if (Number.isFinite(n) && n > max) max = n;
        }
      }
      return `${prefix}${max + 1}`;
    }

    // === Image storage primitives ===
    async function putImage({ dataUrl, model, prompt, parentId = null, nodeId = null,
                              width = 0, height = 0, format = 'png', isUserUpload = false }) {
      const id = uuid();
      const shortId = await nextShortId(isUserUpload ? 'u' : 'g');
      const rec = { id, shortId, dataUrl, model, prompt, parentId, nodeId,
                    width, height, format, createdAt: now() };
      await db.put('images', rec);
      // Async eviction (don't block the insert)
      queueMicrotask(async () => {
        const evicted = await evictLRU();
        if (evicted > 0) toast(`清理了 ${evicted} 张未被分支引用的旧图`);
      });
      return rec;
    }

    async function getImage(id)    { return db.get('images', id); }
    async function listImages()    { return db.getAll('images'); }
    async function deleteImage(id) { return db.delete('images', id); }

    // === LRU eviction ===
    async function evictLRU() {
      const all = (await listImages()).sort((a, b) => a.createdAt - b.createdAt);
      if (all.length <= IMAGE_CAPACITY) return 0;
      const nodes = await listNodes();
      // Identify "main path" image IDs: from each leaf node, walk to root, mark all nodeIds
      const byId = new Map(nodes.map(n => [n.id, n]));
      const childCount = new Map();
      for (const n of nodes) if (n.parentNodeId) childCount.set(n.parentNodeId, (childCount.get(n.parentNodeId) || 0) + 1);
      const leaves = nodes.filter(n => !childCount.has(n.id));
      const protectedNodes = new Set();
      for (const leaf of leaves) {
        let cur = leaf;
        while (cur && !protectedNodes.has(cur.id)) {
          protectedNodes.add(cur.id);
          cur = cur.parentNodeId ? byId.get(cur.parentNodeId) : null;
        }
      }
      const protectedImageIds = new Set(nodes.filter(n => protectedNodes.has(n.id)).flatMap(n => n.imageIds));

      const graceMs = 5000;
      const cutoff = now() - graceMs;
      const removable = all.filter(img => !protectedImageIds.has(img.id) && img.createdAt < cutoff);
      const toRemove = removable.slice(0, all.length - IMAGE_CAPACITY);
      for (const img of toRemove) await deleteImage(img.id);
      return toRemove.length;
    }

    // === Message + Node storage helpers ===
    async function putMessage({ role, text = '', imageIds = [], refImageIds = [],
                                nodeId = null, model = '', error = null }) {
      const id = uuid();
      const rec = { id, role, text, imageIds, refImageIds, nodeId, model, error, createdAt: now() };
      await db.put('messages', rec);
      return rec;
    }

    async function listMessages() {
      const all = await db.getAll('messages');
      return all.sort((a, b) => a.createdAt - b.createdAt);
    }

    async function putNode({ parentNodeId = null, kind, messageId, imageIds = [], label = '' }) {
      const id = uuid();
      const rec = { id, parentNodeId, kind, messageId, imageIds, label, createdAt: now() };
      await db.put('nodes', rec);
      return rec;
    }

    async function listNodes() { return db.getAll('nodes'); }

    // === Key store (shared with gpt文生图+图生图.html) ===
    // Sparkcode 中转平台分组：每个 group 对应一个 new-api 渠道分组的令牌。
    // 一个 key 服务一个分组下所有模型，避免逐模型填多次。
    const KEY_GROUPS = [
      {
        id: 'codex',
        label: 'codex 分组',
        hint: 'GPT 系列：gpt-image-2 出图、gpt-5.5 ✨ 润色',
        models: ['gpt-image-2', 'gpt-5.5'],
      },
      {
        id: 'banana',
        label: '大香蕉 分组',
        hint: 'Gemini 绘图：gemini-3.x-flash/pro-image-preview',
        models: ['gemini-3.1-flash-image-preview', 'gemini-3-pro-image-preview'],
        // Pattern fallback so future Gemini image variants resolve here without code edits.
        pattern: /(gemini[-.\d]*.*image|nano-banana)/i,
      },
    ];
    const GROUP_KEY_STORE  = 'conv_image_group_keys';   // { [groupId]: 'sk-...' }
    const LEGACY_KEY_STORE = 'gpt_image_apikeys';       // sibling per-model store (sole migration source)

    function getGroupForModel(model) {
      if (!model) return null;
      for (const g of KEY_GROUPS) {
        if (g.models.includes(model)) return g;
      }
      // Fallback: pattern match (covers future variants the explicit list missed).
      for (const g of KEY_GROUPS) {
        if (g.pattern && g.pattern.test(model)) return g;
      }
      return null;
    }
    function loadGroupKeys() {
      try { return JSON.parse(localStorage.getItem(GROUP_KEY_STORE) || '{}'); }
      catch { return {}; }
    }
    function getKeyForModel(model) {
      const g = getGroupForModel(model);
      if (!g) return '';
      return loadGroupKeys()[g.id] || '';
    }
    function saveKeyForGroup(groupId, key) {
      const all = loadGroupKeys();
      if (key) all[groupId] = key; else delete all[groupId];
      localStorage.setItem(GROUP_KEY_STORE, JSON.stringify(all));
    }
    // One-shot migration: if the user already has per-model keys in the sibling
    // file's store and our group store is empty, lift them into group keys so
    // returning users don't have to re-enter anything.
    function migrateLegacyKeys() {
      const cur = loadGroupKeys();
      if (Object.keys(cur).length > 0) return;
      let legacy;
      try { legacy = JSON.parse(localStorage.getItem(LEGACY_KEY_STORE) || '{}'); }
      catch { return; }
      if (!legacy || Object.keys(legacy).length === 0) return;
      const migrated = {};
      for (const [model, key] of Object.entries(legacy)) {
        if (!key) continue;
        const g = getGroupForModel(model);
        if (g && !migrated[g.id]) migrated[g.id] = key;
      }
      if (Object.keys(migrated).length > 0) {
        localStorage.setItem(GROUP_KEY_STORE, JSON.stringify(migrated));
      }
    }

    // === Model helpers ===
    function isGeminiImageModel(model) {
      if (!model) return false;
      const m = String(model).toLowerCase();
      if (m.includes('nano-banana')) return true;
      return /gemini[-.\d]*.*image/.test(m);
    }

    function apiAuth(model) {
      const key = getKeyForModel(model);
      if (!key) throw new Error(`未找到 ${model} 的 API Key，请在顶栏配置`);
      return { Authorization: `Bearer ${key}` };
    }

    // Model list + picker
    const MODELS = [
      { id: 'gpt-image-2',                    label: 'GPT Image 2',            supportsMask: true  },
      { id: 'gemini-3.1-flash-image-preview', label: 'Gemini 3.1 Flash Image', supportsMask: false },
      { id: 'gemini-3-pro-image-preview',     label: 'Gemini 3 Pro Image',     supportsMask: false },
    ];
    function modelById(id) { return MODELS.find(m => m.id === id); }

    function hasAnyKey() {
      return Object.values(loadGroupKeys()).some(v => v);
    }

    function renderModelSelect() {
      const sel = $('model-select');
      sel.innerHTML = MODELS.map(m => `<option value="${m.id}">${m.label}</option>`).join('');
      const saved = localStorage.getItem('conv_image_settings_model');
      if (saved && MODELS.some(m => m.id === saved)) sel.value = saved;

    // === API client ===
    async function callGptImageGen({ model, prompt, n = 1, size = '1024x1024',
                                     quality = 'high', background = 'auto', format = 'png' }) {
      const body = { model, prompt, n, size, quality, background, response_format: 'b64_json',
                     output_format: format };
      const res = await fetch(`${API_BASE}/images/generations`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...apiAuth(model) },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`${res.status} ${res.statusText}: ${text.slice(0, 240)}`);
      }
      const data = await res.json();
      if (!data.data?.length) throw new Error('API 未返回图像数据');
      return {
        images: data.data.map(d => ({
          dataUrl: `data:image/${format};base64,${d.b64_json}`,
          format,
        })),
      };
    }

    function nearestEditSize(w, h) {
      const ratio = w / h;
      if (ratio > 1.2)  return '1536x1024';   // landscape
      if (ratio < 0.83) return '1024x1536';   // portrait
      return '1024x1024';                     // square-ish
    }

    function dataUrlToBlob(dataUrl) {
      const [head, b64] = dataUrl.split(',');
      const mime = head.match(/data:([^;]+)/)?.[1] || 'image/png';
      const bin  = atob(b64);
      const arr  = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: mime });
    }

    async function callGptImageEdit({ model, prompt, sourceImages /* [dataUrl] */,
                                      maskDataUrl = null, n = 1, size = '1024x1024' }) {
      const fd = new FormData();
      fd.append('model', model);
      fd.append('prompt', prompt);
      fd.append('n', String(n));
      fd.append('size', size);
      fd.append('response_format', 'b64_json');
      if (sourceImages.length === 1) {
        fd.append('image', dataUrlToBlob(sourceImages[0]), 'source.png');
      } else {
        sourceImages.forEach((u, i) => fd.append('image[]', dataUrlToBlob(u), `source_${i}.png`));
      }
      if (maskDataUrl) fd.append('mask', dataUrlToBlob(maskDataUrl), 'mask.png');

      const res = await fetch(`${API_BASE}/images/edits`, {
        method: 'POST',
        headers: { ...apiAuth(model) },  // do NOT set Content-Type — browser sets boundary
        body: fd,
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`${res.status} ${res.statusText}: ${text.slice(0, 240)}`);
      }
      const data = await res.json();
      if (!data.data?.length) throw new Error('API 未返回图像数据');
      return {
        images: data.data.map(d => ({ dataUrl: `data:image/png;base64,${d.b64_json}`, format: 'png' })),
      };
    }

    async function callGeminiChatImage({ model, prompt, refDataUrls = [],
                                         aspectRatio = '1:1', resolution = '1K' }) {
      let content;
      if (refDataUrls.length > 0) {
        content = [];
        if (prompt) content.push({ type: 'text', text: prompt });
        for (const url of refDataUrls) content.push({ type: 'image_url', image_url: { url } });
      } else {
        content = prompt;
      }
      const body = {
        model, messages: [{ role: 'user', content }],
        modalities: ['image', 'text'], stream: false,
        extra_body: {
          generationConfig: {
            imageConfig: { aspectRatio, imageSize: resolution },
            image_config: { aspect_ratio: aspectRatio, image_size: resolution },
          },
        },
      };
      const res = await fetch(`${API_BASE}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...apiAuth(model) },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`${res.status} ${res.statusText}: ${text.slice(0, 240)}`);
      }
      const data = await res.json();
      const choice = data.choices?.[0];
      if (!choice) {
        // Try to surface upstream's body if it indicates an error
        const upstream = data.error?.message || data.msg || data.message;
        throw new Error(upstream ? `chat 响应空 choices：${upstream}` : 'chat 响应无 choices（上游可能余额不足或限流）');
      }
      const dataUrl = extractGeminiImage(choice.message);
      if (!dataUrl) throw new Error('chat 响应未携带图像');
      return { images: [{ dataUrl, format: 'png' }] };
    }

    function extractGeminiImage(message) {
      const DATA_URL_RE = /data:image\/[a-zA-Z0-9.+-]+;base64,[A-Za-z0-9+/=]+/;
      const content = message?.content;

      if (Array.isArray(content)) {
        for (const part of content) {
          if (part?.type === 'image_url' && part.image_url?.url) return part.image_url.url;
          if (part?.image_url?.url) return part.image_url.url;
          if (typeof part?.text === 'string') {
            const m = DATA_URL_RE.exec(part.text);
            if (m) return m[0];
          }
        }
      }

      if (typeof content === 'string') {
        const m = DATA_URL_RE.exec(content);
        if (m) return m[0];
      }

      return null;
    }

    async function callPolishPrompt(originalPrompt) {
      const POLISH_MODEL = 'gpt-5.5';
      const body = {
        model: POLISH_MODEL,
        messages: [
          { role: 'system', content: '你是 image generation prompt 优化助手。优化用户给的 prompt：增加视觉细节、保持原意、保持简洁。仅输出优化后的 prompt，不要加任何说明、引号或前缀。' },
          { role: 'user',   content: originalPrompt },
        ],
        temperature: 0.6,
      };
      const res = await fetch(`${API_BASE}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...apiAuth(POLISH_MODEL) },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const data = await res.json();
      const out = data.choices?.[0]?.message?.content?.trim();
      if (!out) throw new Error('润色 LLM 无返回');
      return out;
    }

    // === UI helpers ===
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtTime(ts)   { return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }

    function attachModalDismiss(modalEl, onClose) {
      let closed = false;
      const escHandler = e => { if (e.key === 'Escape') close(); };
      function close() {
        if (closed) return;
        closed = true;
        document.removeEventListener('keydown', escHandler);
        onClose();
      }
      modalEl.addEventListener('click', e => { if (e.target === modalEl) close(); });
      document.addEventListener('keydown', escHandler);
      return close;
    }

    // === Tabs + workspace ===
    const TABS = [
      { id: 'big',     label: '大图' },
      { id: 'tree',    label: '分支树' },
      { id: 'library', label: '图库' },
      { id: 'mask',    label: '区域编辑', modelGated: true },
    ];
    let activeTab     = 'big';
    let activeImageId = null;
    const refState = { imageIds: [] };  // currently engaged refs
    let selectedNodeIds = [];
    const rerollingNodes = new Set();
    const maskState = { sourceImageId: null, brushSize: 30, history: [] };

    async function renderRefPills() {
      const bar = $('ref-pills');
      if (!bar) return;
      if (refState.imageIds.length === 0) { bar.innerHTML = ''; return; }
      const imgs = await Promise.all(refState.imageIds.map(getImage));
      bar.innerHTML = imgs.filter(Boolean).map(img => `

                    border:1px solid var(--accent-tint-2);border-radius:4px;padding:4px 8px 4px 4px;">

      bar.querySelectorAll('[data-remove-ref]').forEach(el =>

    function refreshTabs() {
      const model = modelById($('model-select').value);
      const supportsMask  = model?.supportsMask;
      const visibleTabs   = TABS.filter(t => !t.modelGated || supportsMask);
      $('tab-bar').innerHTML = visibleTabs.map(t =>
        `<div class="tab ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</div>`
      ).join('');
      $('tab-bar').querySelectorAll('.tab').forEach(el =>
        el.addEventListener('click', () => { activeTab = el.dataset.tab; refreshTabs(); renderActiveTab(); }));
      if (!visibleTabs.some(t => t.id === activeTab)) { activeTab = 'big'; refreshTabs(); return; }
      renderActiveTab();
    }

    async function renderActiveTab() {
      if (activeTab === 'big')     return renderActiveImage();
      if (activeTab === 'tree')    return renderTree();
      if (activeTab === 'library') return renderLibrary();
      if (activeTab === 'mask')    return renderMask();
    }

    async function renderActiveImage() {
      const tc = $('tab-content');
      if (!activeImageId) {
        const all = await listImages();
        activeImageId = all.length ? all[all.length - 1].id : null;
      }
      if (!activeImageId) {
        tc.innerHTML = `<div style="color:var(--muted);text-align:center;padding:80px 24px;font-size:13px;">
          <div style="font-family:var(--font-display);font-size:22px;color:var(--faint);margin-bottom:12px;">尚无图像</div>
          在左侧输入提示词后开始生成</div>`;
        return;
      }
      const img = await getImage(activeImageId);
      tc.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:100%;padding:8px;">
        <img src="${img.dataUrl}" style="max-width:100%;max-height:100%;border-radius:3px;box-shadow:var(--shadow-modal);background:var(--paper);">
      </div>`;
    }

    // Stubs filled by later tasks
    async function renderTree() {
      const nodes = await listNodes();
      const imgs  = await listImages();
      const imgMap = new Map(imgs.map(i => [i.id, i]));
      const tc = $('tab-content');
      if (nodes.length === 0) {
        tc.innerHTML = `<div style="color:var(--muted);text-align:center;padding:80px 24px;font-size:13px;">
          <div style="font-family:var(--font-display);font-size:22px;color:var(--faint);margin-bottom:12px;">尚无分支</div>
          生成第一张图后会自动出现分支</div>`;
        return;
      }

      // Layout: assign columns by depth, rows by sibling order
      const byParent = new Map();
      for (const n of nodes) {
        const k = n.parentNodeId || '__root__';
        if (!byParent.has(k)) byParent.set(k, []);
        byParent.get(k).push(n);
      }
      for (const arr of byParent.values()) arr.sort((a, b) => a.createdAt - b.createdAt);

      const NODE_W = 100, NODE_H = 100, GAP_X = 60, GAP_Y = 30;
      const positions = new Map();  // nodeId → {x, y}
      let nextRow = 0;
      function place(node, depth) {
        const children = byParent.get(node.id) || [];
        if (children.length === 0) {
          positions.set(node.id, { x: depth * (NODE_W + GAP_X), y: nextRow * (NODE_H + GAP_Y) });
          nextRow++;
        } else {
          const childRowsStart = nextRow;
          children.forEach(c => place(c, depth + 1));
          const childRowsEnd = nextRow - 1;
          const midY = ((childRowsStart + childRowsEnd) / 2) * (NODE_H + GAP_Y);
          positions.set(node.id, { x: depth * (NODE_W + GAP_X), y: midY });
        }
      }
      for (const root of (byParent.get('__root__') || [])) place(root, 0);
      // Anchor any orphan nodes (parentNodeId points to deleted node — happens after LRU eviction)
      for (const n of nodes) {
        if (!positions.has(n.id)) place(n, 0);
      }

      const maxX = Math.max(...[...positions.values()].map(p => p.x)) + NODE_W + 20;
      const maxY = Math.max(...[...positions.values()].map(p => p.y)) + NODE_H + 20;

      // 笔触风连线：父→子，curved Bezier
      const lines = nodes.filter(n => n.parentNodeId && positions.has(n.parentNodeId)).map(n => {
        const p = positions.get(n.parentNodeId), c = positions.get(n.id);
        const x1 = p.x + NODE_W, y1 = p.y + NODE_H/2;
        const x2 = c.x,           y2 = c.y + NODE_H/2;
        const cx = (x1 + x2) / 2;
        return `<path d="M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}"
                fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-opacity="0.55" stroke-linecap="round"/>`;
      }).join('');

      const cards = nodes.map(n => {
        const p = positions.get(n.id);
        const firstImg = imgMap.get(n.imageIds[0]);
        const isSelected = selectedNodeIds.includes(n.id);
        const sel = isSelected
          ? 'stroke="var(--accent)" stroke-width="2.5"'
          : 'stroke="var(--border-strong)" stroke-width="1"';
        const kindBadge = { root: '原', edit: '编', reroll: '重', gen: '生' }[n.kind] || '?';
        const childCount = (byParent.get(n.id) || []).length;
        return `
          <g data-node-id="${n.id}" style="cursor:pointer;">
            <rect x="${p.x}" y="${p.y}" width="${NODE_W}" height="${NODE_H}" rx="3" fill="var(--paper)" ${sel}/>
            ${firstImg ? `<image href="${firstImg.dataUrl}" x="${p.x+4}" y="${p.y+4}" width="${NODE_W-8}" height="${NODE_H-8}" preserveAspectRatio="xMidYMid slice"/>` : ''}
            <rect x="${p.x+4}" y="${p.y+4}" width="20" height="20" rx="2" fill="${isSelected ? 'var(--accent)' : 'rgba(168,40,40,0.85)'}"/>
            <text x="${p.x + 14}" y="${p.y + 18}" fill="#fff" font-size="11" font-family="'Noto Serif SC',serif" font-weight="600" text-anchor="middle">${kindBadge}</text>
            ${childCount ? `<text x="${p.x + NODE_W - 6}" y="${p.y + NODE_H - 6}" text-anchor="end" fill="#fff" font-size="10" font-weight="700" style="text-shadow:0 0 3px rgba(0,0,0,0.8);">${childCount}</text>` : ''}
          </g>`;
      }).join('');

      const compareBtn = selectedNodeIds.length >= 2
        ? `<button id="compare-btn" class="btn-primary" style="margin-bottom:14px;padding:7px 18px;">▣ 并排对比 (${selectedNodeIds.length})</button>`
        : '';

      tc.innerHTML = `
        <div style="margin-bottom:14px;color:var(--muted);font-size:11px;letter-spacing:0.5px;">
          单击选中 · <span style="color:var(--ink-soft);">Shift+单击</span> 多选（最多 4 张） · <span style="color:var(--ink-soft);">右键</span> 重新生成
        </div>
        ${compareBtn}
        <svg width="${maxX}" height="${maxY}" style="background:var(--paper-warm);border:1px solid var(--border);border-radius:4px;">${lines}${cards}</svg>
      `;

      tc.querySelectorAll('g[data-node-id]').forEach(g => {
        g.addEventListener('click', e => {
          const nid = g.dataset.nodeId;
          if (e.shiftKey) {
            if (selectedNodeIds.includes(nid)) selectedNodeIds = selectedNodeIds.filter(x => x !== nid);
            else if (selectedNodeIds.length < 4) selectedNodeIds.push(nid);
            else toast('最多对比 4 张');
            renderTree();
          } else {
            selectedNodeIds = [nid];
            const node = nodes.find(x => x.id === nid);
            if (node?.imageIds[0]) {
              activeImageId = node.imageIds[0];
              activeTab = 'big';
              refreshTabs();   // also re-paints the tree if user comes back; no separate renderTree() needed
              return;
            }
            renderTree();  // fallback: still re-render selection if node has no images
          }
        });
        g.addEventListener('contextmenu', e => {
          e.preventDefault();
          onReroll(g.dataset.nodeId);
        });
      });
      tc.querySelector('#compare-btn')?.addEventListener('click', () => openCompareModal(selectedNodeIds));
    }

    async function onReroll(nodeId) {
      if (rerollingNodes.has(nodeId)) {
        toast('该节点正在 Re-roll 中…');
        return;
      }
      rerollingNodes.add(nodeId);
      try {
        const [allNodes, allMsgs] = await Promise.all([listNodes(), listMessages()]);
        const node = allNodes.find(n => n.id === nodeId);
        if (!node) return;
        const msg = allMsgs.find(m => m.id === node.messageId);
        if (!msg) return;
        // Find the user message that triggered this assistant message (immediately preceding)
        const idx = allMsgs.indexOf(msg);
        const userMsg = allMsgs.slice(0, idx).reverse().find(m => m.role === 'user');
        if (!userMsg) { toast('找不到原始 prompt'); return; }
        // Replay — warn if any reference images were deleted
        const expectedRefs = (userMsg.refImageIds || []).length;
        const refDataUrls = [];
        for (const id of (userMsg.refImageIds || [])) {
          const img = await getImage(id);
          if (img) refDataUrls.push(img.dataUrl);
        }
        const missingCount = expectedRefs - refDataUrls.length;
        if (missingCount > 0) {
          if (refDataUrls.length === 0) {
            toast(`原始引用 ${expectedRefs} 张全部已被清理，无法 Re-roll`);
            return;
          }
          toast(`警告：${missingCount} 张原始引用已丢失，Re-roll 结果可能不一致`);
        }
        const aMsg = await putMessage({ role: 'assistant', text: '', model: msg.model });
        await renderChat();
        try {
          const result = isGeminiImageModel(msg.model)
            ? await callGeminiChatImage({ model: msg.model, prompt: userMsg.text, refDataUrls })
            : refDataUrls.length > 0
              ? await callGptImageEdit({ model: msg.model, prompt: userMsg.text, sourceImages: refDataUrls })
              : await callGptImageGen({ model: msg.model, prompt: userMsg.text });
          const recs = await Promise.all(result.images.map(img =>
            putImage({ dataUrl: img.dataUrl, model: msg.model, prompt: userMsg.text, format: img.format })));
          const ids = recs.map(r => r.id);
          aMsg.imageIds = ids;
          const newNode = await putNode({ parentNodeId: node.parentNodeId, kind: 'reroll', messageId: aMsg.id, imageIds: ids });
          aMsg.nodeId = newNode.id;
          await db.put('messages', aMsg);
          for (const r of recs) { r.nodeId = newNode.id; r.parentId = node.parentNodeId; await db.put('images', r); }
          await renderChat();
          if (activeTab === 'tree') renderTree();
          toast('Re-roll 完成');
        } catch (e) {
          aMsg.error = e.message;
          await db.put('messages', aMsg);
          await renderChat();
        }
      } finally {
        rerollingNodes.delete(nodeId);
      }

      if (!maskState.sourceImageId) {

        tc.innerHTML = `<div style="color:var(--muted);margin-bottom:14px;font-size:12px;">从图库选择一张作为源图</div>

            `).join('')}

        tc.querySelectorAll('[data-pick]').forEach(el => {
          el.addEventListener('click', () => { maskState.sourceImageId = el.dataset.pick; renderMask(); });

        });

      }

      const src = await getImage(maskState.sourceImageId);
      tc.innerHTML = `
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border-soft);">
          <label style="font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;">笔刷
            <input id="brush-size" type="range" min="5" max="100" value="${maskState.brushSize}" style="vertical-align:middle;accent-color:var(--accent);"></label>
          <button id="eraser-btn" class="btn-ghost" style="padding:5px 12px;font-size:12px;">橡皮</button>
          <button id="undo-btn"   class="btn-ghost" style="padding:5px 12px;font-size:12px;">撤销</button>
          <button id="clear-btn"  class="btn-ghost" style="padding:5px 12px;font-size:12px;">清空</button>
          <button id="repick-btn" class="btn-ghost" style="padding:5px 12px;font-size:12px;margin-left:auto;">换源图</button>
        </div>
        <div style="position:relative;background:var(--bg-2);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:inline-block;box-shadow:var(--shadow-img);">
          <img id="mask-base" src="${src.dataUrl}" style="display:block;max-width:100%;max-height:60vh;">
          <canvas id="mask-overlay" style="position:absolute;inset:0;cursor:crosshair;touch-action:none;"></canvas>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;">
          <input id="mask-prompt" class="field-input" placeholder="描述要修改的内容（如：换成花瓶）" style="flex:1;">
          <button id="apply-mask-btn" class="btn-primary">🎨 应用编辑</button>
        </div>
      `;

      const baseImg = $('mask-base');
      const canvas  = $('mask-overlay');
      await new Promise(r => baseImg.complete ? r() : baseImg.onload = r);
      canvas.width  = baseImg.naturalWidth;
      canvas.height = baseImg.naturalHeight;
      canvas.style.width  = baseImg.width + 'px';
      canvas.style.height = baseImg.height + 'px';
      const ctx = canvas.getContext('2d');

      // Restore history (if revisiting)
      for (const stroke of maskState.history) drawStroke(ctx, stroke, canvas.width, baseImg.width);

      let drawing = false; let mode = 'paint';
      function pointerPos(e) {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width;
        const sy = canvas.height / r.height;
        return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
      }
      let stroke = null;
      canvas.addEventListener('pointerdown', e => {
        drawing = true;
        stroke = { mode, brush: maskState.brushSize * (canvas.width / baseImg.width), points: [] };
        const p = pointerPos(e); stroke.points.push(p); paint(p);
      });
      canvas.addEventListener('pointermove', e => {
        if (!drawing) return;
        const p = pointerPos(e); stroke.points.push(p); paint(p);
      });
      ['pointerup','pointerleave','pointercancel'].forEach(ev => canvas.addEventListener(ev, () => {
        if (drawing && stroke?.points.length) maskState.history.push(stroke);
        drawing = false; stroke = null;
      }));
      function paint(p) {
        ctx.globalCompositeOperation = mode === 'erase' ? 'destination-out' : 'source-over';
        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, (stroke?.brush || maskState.brushSize) / 2, 0, 2 * Math.PI);
        ctx.fill();
      }

      $('brush-size').addEventListener('input', e => { maskState.brushSize = parseInt(e.target.value, 10); });
      $('eraser-btn').addEventListener('click', () => { mode = mode === 'erase' ? 'paint' : 'erase'; toast(`模式：${mode}`); });
      $('undo-btn').addEventListener('click',  () => { maskState.history.pop(); renderMask(); });
      $('clear-btn').addEventListener('click', () => { maskState.history = []; renderMask(); });
      $('repick-btn').addEventListener('click', () => { maskState.sourceImageId = null; maskState.history = []; renderMask(); });
      $('apply-mask-btn').addEventListener('click', () => onApplyMask(canvas, baseImg, src));
    }

    function drawStroke(ctx, stroke, canvasW, baseW) {
      ctx.globalCompositeOperation = stroke.mode === 'erase' ? 'destination-out' : 'source-over';
      ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
      for (const p of stroke.points) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, stroke.brush / 2, 0, 2 * Math.PI);
        ctx.fill();
      }
    }

    async function onApplyMask(canvas, baseImg, src) {
      const prompt = $('mask-prompt').value.trim();
      if (!prompt) { toast('请输入修改描述'); return; }
      if (maskState.history.length === 0) { toast('请先涂出要修改的区域'); return; }

      // Build mask PNG: same size as source, alpha=0 in painted area, alpha=255 elsewhere
      const w = canvas.width, h = canvas.height;
      const maskCanvas = document.createElement('canvas');
      maskCanvas.width = w; maskCanvas.height = h;
      const mctx = maskCanvas.getContext('2d');
      mctx.fillStyle = 'rgb(0,0,0)';
      mctx.fillRect(0, 0, w, h);  // start opaque
      // Now subtract the painted regions (where overlay has any color) → make alpha=0
      const overlayData = canvas.getContext('2d').getImageData(0, 0, w, h).data;
      const maskImg = mctx.getImageData(0, 0, w, h);
      for (let i = 0; i < overlayData.length; i += 4) {
        if (overlayData[i + 3] > 0) {
          // Painted: punch transparent into mask
          maskImg.data[i + 3] = 0;
        }
      }
      mctx.putImageData(maskImg, 0, 0);
      const maskDataUrl = maskCanvas.toDataURL('image/png');

      const model = $('model-select').value;
      const userMsg = await putMessage({ role: 'user', text: `[mask] ${prompt}`, model, refImageIds: [src.id] });
      const aMsg    = await putMessage({ role: 'assistant', text: '', model });
      await renderChat();

      const btn = $('apply-mask-btn');
      btn.disabled = true; btn.textContent = '生成中…';
      try {
        const result = await callGptImageEdit({
          model, prompt, sourceImages: [src.dataUrl], maskDataUrl, n: 1, size: nearestEditSize(w, h),
        });
        const recs = await Promise.all(result.images.map(img =>
          putImage({ dataUrl: img.dataUrl, model, prompt, format: img.format })));
        const ids = recs.map(r => r.id);
        aMsg.imageIds = ids;
        const node = await putNode({ parentNodeId: src.nodeId, kind: 'edit', messageId: aMsg.id, imageIds: ids });
        aMsg.nodeId = node.id;
        await db.put('messages', aMsg);
        for (const r of recs) { r.nodeId = node.id; r.parentId = src.nodeId; await db.put('images', r); }
        maskState.history = [];
        activeImageId = ids[0]; activeTab = 'big'; refreshTabs();
        await renderChat();
        toast('编辑完成');
      } catch (e) {
        aMsg.error = e.message;
        await db.put('messages', aMsg);
        await renderChat();
        toast(`编辑失败：${e.message}`);
      } finally {
        btn.disabled = false; btn.textContent = '🎨 应用编辑';
      }
    }

    // === Retry handler (replays the generation for a failed assistant message) ===
    async function onRetry(failedMsgId) {
      const btn = document.querySelector(`button[data-retry-msg="${failedMsgId}"]`);
      if (btn?.disabled) return;
      if (btn) { btn.disabled = true; btn.textContent = '重试中…'; }
      const allMsgs = await listMessages();
      const failed = allMsgs.find(m => m.id === failedMsgId);
      if (!failed) return;
      const userMsg = allMsgs.slice(0, allMsgs.indexOf(failed)).reverse().find(m => m.role === 'user');
      if (!userMsg) return;
      // Replay against the same assistant message slot — clear error first
      failed.error = null;
      failed.imageIds = [];
      await db.put('messages', failed);
      await renderChat();

      const refDataUrls = [];
      for (const id of (userMsg.refImageIds || [])) {
        const img = await getImage(id);
        if (img) refDataUrls.push(img.dataUrl);
        else {
          toast(`引用图 ${id.slice(0, 8)} 已被清理`);
          failed.error = '引用图已被清理';
          await db.put('messages', failed);
          await renderChat();
          return;
        }
      }

      try {
        const result = isGeminiImageModel(failed.model)
          ? await callGeminiChatImage({ model: failed.model, prompt: userMsg.text, refDataUrls })
          : refDataUrls.length > 0
            ? await callGptImageEdit({ model: failed.model, prompt: userMsg.text, sourceImages: refDataUrls })
            : await callGptImageGen({ model: failed.model, prompt: userMsg.text });
        const recs = await Promise.all(result.images.map(img =>
          putImage({ dataUrl: img.dataUrl, model: failed.model, prompt: userMsg.text, format: img.format })));
        const ids = recs.map(r => r.id);
        failed.imageIds = ids;
        if (!failed.nodeId) {
          const node = await putNode({ kind: refDataUrls.length > 0 ? 'edit' : 'root', messageId: failed.id, imageIds: ids });
          failed.nodeId = node.id;
          for (const r of recs) { r.nodeId = node.id; await db.put('images', r); }
        }
        await db.put('messages', failed);
        toast('重试成功');
      } catch (e) {
        failed.error = e.message;
        await db.put('messages', failed);
        toast(`重试仍失败：${e.message}`);
      }
      await renderChat();
    }

    // === Send handler ===
    async function onSend() {
      const prompt = $('prompt-input').value.trim();
      if (!prompt) { toast('请输入提示词'); return; }

      const sendBtn    = $('send-btn');
      const newChatBtn = $('new-chat-btn');
      const ta         = $('prompt-input');

      // Guard against re-entry (double-click, Ctrl+Enter race)
      if (sendBtn.disabled) return;
      sendBtn.disabled    = true;
      newChatBtn.disabled = true;
      ta.disabled         = true;

      try {
        const model = $('model-select').value;
        const n = parseInt($('count-input').value, 10) || 1;

        // Resolve refs before disabling UI so we can fail-fast with a clear message
        const refIds = [...refState.imageIds];
        const refDataUrls = [];
        for (const id of refIds) {
          const img = await getImage(id);
          if (!img) {
            // Prune dead ref so user isn't trapped in toast loop
            refState.imageIds = refState.imageIds.filter(x => x !== id);
            await renderRefPills();
            toast(`引用图已被清理，已自动移除`);
            return;
          }
          refDataUrls.push(img.dataUrl);
        }

        // Persist user message (with refImageIds)
        await putMessage({ role: 'user', text: prompt, model, refImageIds: refIds });
        // Persist placeholder assistant message
        const aMsg = await putMessage({ role: 'assistant', text: '', model });
        await renderChat();

        try {
          let result;
          if (isGeminiImageModel(model)) {
            const aspectRatio = $('aspect-input')?.value || '1:1';
            const resolution  = $('resolution-input')?.value || '1K';
            const calls = Array.from({ length: n }, () =>
              callGeminiChatImage({ model, prompt, refDataUrls, aspectRatio, resolution }));
            const settled = await Promise.all(calls.map(p => p.catch(e => ({ error: e }))));
            const ok = settled.filter(s => !s.error);
            if (ok.length === 0) throw settled[0].error || new Error('全部失败');
            result = { images: ok.flatMap(s => s.images) };
          } else {
            // gpt-image-2: refs ⇒ /v1/images/edits, no refs ⇒ /v1/images/generations
            const size = $('size-input')?.value || '1024x1024';
            if (refDataUrls.length > 0) {
              result = await callGptImageEdit({ model, prompt, sourceImages: refDataUrls, n, size });
            } else {
              result = await callGptImageGen({ model, prompt, n, size });
            }
          }

          // Save images
          const imageRecs = await Promise.all(result.images.map(img =>
            putImage({ dataUrl: img.dataUrl, model, prompt, format: img.format })
          ));

          // Branching rules:
          // - no refs ⇒ new root
          // - has refs ⇒ child of the node that contains the FIRST referenced image
          let parentNodeId = null;
          let kind = 'root';
          if (refIds.length > 0) {
            const firstRef = await getImage(refIds[0]);
            if (firstRef?.nodeId) { parentNodeId = firstRef.nodeId; kind = 'edit'; }
          }
          const imageIds = imageRecs.map(r => r.id);
          const node = await putNode({ parentNodeId, kind, messageId: aMsg.id, imageIds });
          aMsg.imageIds = imageIds;
          aMsg.nodeId   = node.id;
          // keep the existing single-write of aMsg — don't double-write here
          await db.put('messages', aMsg);

          // Batch image nodeId + parentId update in one transaction
          const tx = db.transaction('images', 'readwrite');
          await Promise.all(imageRecs.map(r => {
            r.nodeId   = node.id;
            r.parentId = parentNodeId;
            return tx.store.put(r);
          }));
          await tx.done;

          ta.value = '';

          // Clear refs after successful persistence chain
          refState.imageIds = [];
          await renderRefPills();
        } catch (e) {
          aMsg.error = e.message;
          await db.put('messages', aMsg);
          toast(`生成失败：${e.message}`);
        }
        await renderChat();
        await renderActiveImage();
      } finally {
        sendBtn.disabled    = false;
        newChatBtn.disabled = false;
        ta.disabled         = false;
      }
    }

    // === Chat renderer ===
    async function renderChat() {
      const msgs    = await listMessages();
      const stream  = $('chat-stream');
      const imgCache = await listImages();
      const imgMap  = new Map(imgCache.map(i => [i.id, i]));

      stream.innerHTML = msgs.map(m => {

            </div>`;
        }
        // assistant
        const imgsHtml = (m.imageIds || []).map(id => {
          const img = imgMap.get(id);

          return `<div style="position:relative;display:inline-block;margin:3px;" class="img-card">

            <span style="position:absolute;bottom:3px;left:3px;background:rgba(20,15,10,0.72);

            <button data-engage-ref="${id}" title="作为引用"
                    style="position:absolute;top:3px;right:3px;background:rgba(20,15,10,0.7);
                           color:#fff;border:0;border-radius:2px;padding:2px 6px;cursor:pointer;font-size:11px;line-height:1;">↩</button>
            ${isGptImage
              ? `<button data-engage-mask="${id}" title="编辑此图"
                        style="position:absolute;top:3px;right:33px;background:rgba(20,15,10,0.7);
                               color:#fff;border:0;border-radius:2px;padding:2px 6px;cursor:pointer;font-size:11px;line-height:1;">🖌</button>`
              : ''}
          </div>`;
        }).join('');
        const errHtml = m.error
          ? `<div style="color:var(--error);font-size:12px;margin-top:8px;display:inline-flex;align-items:center;gap:8px;
                        background:var(--accent-tint);border:1px solid var(--accent-tint-2);padding:6px 10px;border-radius:3px;">
               ⚠ ${escapeHtml(m.error)}
               <button data-retry-msg="${m.id}"
                       style="background:var(--accent);color:#fff;border:0;padding:3px 10px;border-radius:2px;cursor:pointer;font-size:11px;letter-spacing:1px;">↻ 重试</button>
             </div>`
          : '';
        return `
          <div style="margin-bottom:18px;">
            <div style="font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:0.5px;font-weight:500;">
              <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);">${escapeHtml(m.model)}</span> · ${fmtTime(m.createdAt)}
            </div>
            <div>${imgsHtml || (m.error ? '' : '<span style="color:var(--muted);font-size:12px;">生成中…</span>')}</div>
            ${errHtml}
          </div>`;
      }).join('');

      // Wire thumbnail clicks → activate image in 大图 tab
      stream.querySelectorAll('img[data-action="zoom"]').forEach(el => {
        el.addEventListener('click', () => {
          activeImageId = el.dataset.imgId;
          activeTab = 'big';
          refreshTabs();
        });
      });

      // Wire ↩ ref-engagement buttons
      stream.querySelectorAll('button[data-engage-ref]').forEach(el =>
        el.addEventListener('click', () => {
          const id = el.dataset.engageRef;
          if (!refState.imageIds.includes(id)) refState.imageIds.push(id);
          renderRefPills();
          toast(`引用了 ${(imgMap.get(id) || {}).shortId || ''}`);
        }));

      // Wire 🖌 mask-entry buttons
      stream.querySelectorAll('button[data-engage-mask]').forEach(el =>
        el.addEventListener('click', () => {
          const model = $('model-select').value;
          if (!modelById(model)?.supportsMask) {
            toast('当前模型不支持 mask，请切到 gpt-image-2');
            return;
          }
          maskState.sourceImageId = el.dataset.engageMask;
          maskState.history = [];
          activeTab = 'mask';
          refreshTabs();
        }));

      // Wire ↻ retry buttons on failed assistant messages
      stream.querySelectorAll('button[data-retry-msg]').forEach(el =>
        el.addEventListener('click', () => onRetry(el.dataset.retryMsg)));

      stream.scrollTop = stream.scrollHeight;
    }

    // === User file ingestion + drag & drop ===
    function fileToDataUrl(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload  = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }

    async function ingestUserFile(file) {
      const dataUrl = await fileToDataUrl(file);
      const rec = await putImage({ dataUrl, model: '(uploaded)', prompt: '', isUserUpload: true,
                                   format: file.type.split('/')[1] || 'png' });
      if (!refState.imageIds.includes(rec.id)) refState.imageIds.push(rec.id);
      await renderRefPills();
      toast(`已上传 ${rec.shortId}`);
    }

    document.addEventListener('dragover', e => { e.preventDefault(); });
    document.addEventListener('drop', async e => {
      e.preventDefault();
      if (!e.dataTransfer.files?.length) return;
      for (const file of e.dataTransfer.files) {
        if (file.type === 'application/json' || file.name.endsWith('.json')) {
          await importBundle(file);
          return;  // single JSON drop = full import; don't also process other files
        }
        if (file.type.startsWith('image/')) await ingestUserFile(file);
      }
    });

    // === Export / Import ===
    async function exportSession() {
      const images   = await listImages();
      const messages = await listMessages();
      const nodes    = await listNodes();
      const settings = {
        model: $('model-select').value,
        presets: STYLE_PRESETS,  // captured for parity if user customized later
      };
      const bundle = { version: 1, exportedAt: now(), settings, images, messages, nodes };
      const blob = new Blob([JSON.stringify(bundle)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,16).replace(/[-:T]/g, '').replace(/(\d{8})(\d{4})/, '$1-$2');
      a.href = url; a.download = `conv-image-${stamp}-${nodes.length}nodes.json`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      toast('已导出会话');
    }

    async function backupCurrent() {
      const ts = now();
      const key = `conv_image_backup_${ts}`;
      const backup = {
        ts,
        images:   await listImages(),
        messages: await listMessages(),
        nodes:    await listNodes(),
      };
      try {
        localStorage.setItem(key, JSON.stringify(backup));
      } catch (e) {
        console.warn('backup failed (storage full?)', e);
        toast('备份失败（localStorage 已满），导入仍会继续');
      }
      // Clean expired backups (>7d)
      const cutoff = ts - 7 * 86400_000;
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (!k?.startsWith('conv_image_backup_')) continue;
        const t = parseInt(k.slice('conv_image_backup_'.length), 10);
        if (Number.isFinite(t) && t < cutoff) localStorage.removeItem(k);
      }
      return key;
    }

    async function importBundle(file) {
      let bundle;
      try { bundle = JSON.parse(await file.text()); }
      catch { toast('文件格式错误（不是 JSON）'); return; }
      if (bundle.version !== 1) { toast('版本不匹配（期望 v1）'); return; }
      const counts = `${bundle.images?.length || 0} 张图、${bundle.messages?.length || 0} 条消息、${bundle.nodes?.length || 0} 个分支`;
      const exportedAt = bundle.exportedAt
        ? new Date(bundle.exportedAt).toLocaleString('zh-CN')
        : '未知时间';
      if (!confirm(`即将导入备份（导出于 ${exportedAt}）：${counts}。\n\n当前会话会被清空（已自动备份到本地，7 天后过期）。继续？`)) return;

      // Backup current state to a versioned store
      const backupKey = await backupCurrent();

      // Replace
      try {
        await db.clear('images');
        await db.clear('messages');
        await db.clear('nodes');
        for (const img of bundle.images   || []) await db.put('images', img);
        for (const msg of bundle.messages || []) await db.put('messages', msg);
        for (const nd  of bundle.nodes    || []) await db.put('nodes', nd);
      } catch (e) {
        toast(`导入失败：${e.message}。备份保留在 localStorage[${backupKey}]，可手动恢复`);
        console.error('Import failed mid-write. Backup key:', backupKey, e);
        return;
      }

      activeImageId = null;
      await renderChat();
      refreshTabs();
      toast('导入完成');
      console.log('[conv-image] Import complete. Previous session backed up at localStorage[' + backupKey + ']');
    }

    // === Bootstrap ===
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        await initDB();
        renderModelSelect();
        await renderInputArea();
        refreshTabs();
        await renderChat();
        $('header-status').textContent = `IDB ready · ${(await listMessages()).length} 条历史`;

        // Re-render input area whenever the model changes (e.g. Gemini vs GPT controls differ)
        // Also auto-switch off Mask tab when user switches to a model that doesn't support mask
        $('model-select').addEventListener('change', () => {
          renderInputArea();
          if (activeTab === 'mask' && !modelById($('model-select').value)?.supportsMask) {
            activeTab = 'big';
            toast('已切换到大图 tab（Gemini 不支持 mask）');
          }
          refreshTabs();
        });

        // New chat: wired here so db is guaranteed ready
        $('new-chat-btn').addEventListener('click', async () => {
          if (!confirm('开新对话会清空当前所有图像、消息和分支树（已存的不会自动备份）。继续？')) return;
          await db.clear('images');
          await db.clear('messages');
          await db.clear('nodes');
          activeImageId = null;
          selectedNodeIds = [];
          await renderChat();
          refreshTabs();
          toast('已开新对话');
        });

        $('export-btn').addEventListener('click', exportSession);

        $('import-btn').addEventListener('click', () => {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = '.json,application/json';
          inp.addEventListener('change', e => { if (e.target.files[0]) importBundle(e.target.files[0]); });
          inp.click();
        });

        $('settings-btn').addEventListener('click', () => openKeyManagerModal());

        // Lift any per-model keys from the sibling file's store into the new
        // group store so returning users don't have to re-enter anything.
        migrateLegacyKeys();

        // First-run prompt: if no group token is configured, open the manager
        // modal so the user lands on a clear "configure to begin" surface
        // instead of hitting an opaque "未找到 API Key" toast on first send.
        if (!hasAnyKey()) {
          openKeyManagerModal({ firstRun: true });
        }
      } catch (e) {
        $('header-status').textContent = `IDB error: ${e.message}`;
        toast('本地存储不可用');
      }
    });
  </script>
</body>
</html>
