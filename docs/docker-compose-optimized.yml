# ============================================
# 性能优化版 Docker Compose 配置
# ============================================
# 此配置针对高峰期性能问题进行了优化
# 主要优化点：
# 1. 数据库连接池配置
# 2. PostgreSQL性能参数
# 3. Redis配置优化
# ============================================

version: '3.4'

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # 数据库连接配置
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api

      # ⭐ 数据库连接池优化（重要）
      - SQL_MAX_IDLE_CONNS=200        # 空闲连接数（从100增加到200）
      - SQL_MAX_OPEN_CONNS=500        # 最大连接数（从1000降低到500，避免数据库过载）
      - SQL_MAX_LIFETIME=300          # 连接生命周期5分钟（从60秒增加到300秒）

      # Redis连接
      - REDIS_CONN_STRING=redis://redis

      # 时区设置
      - TZ=Asia/Shanghai

      # 日志和批量更新配置
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - BATCH_UPDATE_INTERVAL=5       # 批量更新间隔（秒）

      # ⭐ 流式超时优化
      - STREAMING_TIMEOUT=300         # 流模式超时时间（秒）

      # 会话密钥（多机部署必须设置）
      # - SESSION_SECRET=your_random_string_here

      # 同步频率
      # - SYNC_FREQUENCY=60

      # 分析工具（可选）
      # - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX
      # - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      # - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js

    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    # ⭐ Redis性能优化配置
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    # 如果需要持久化，可以启用以下配置：
    # volumes:
    #   - redis_data:/data

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    # ⭐ PostgreSQL性能优化参数
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"           # 共享缓冲区（建议为系统内存的25%）
      - "-c"
      - "effective_cache_size=1GB"       # 有效缓存大小（建议为系统内存的50-75%）
      - "-c"
      - "work_mem=16MB"                  # 单个查询操作的内存（从4MB增加）
      - "-c"
      - "maintenance_work_mem=128MB"     # 维护操作内存（从64MB增加）
      - "-c"
      - "max_connections=200"            # 最大连接数（与应用连接池匹配）
      - "-c"
      - "random_page_cost=1.1"           # SSD优化（默认4.0，SSD建议1.1）
      - "-c"
      - "effective_io_concurrency=200"   # SSD并发IO（默认1，SSD建议200）
      - "-c"
      - "wal_buffers=16MB"               # WAL缓冲区
      - "-c"
      - "checkpoint_completion_target=0.9" # 检查点完成目标
      - "-c"
      - "max_wal_size=2GB"               # 最大WAL大小
      - "-c"
      - "min_wal_size=1GB"               # 最小WAL大小
      - "-c"
      - "log_min_duration_statement=1000" # 记录超过1秒的慢查询
      - "-c"
      - "log_line_prefix=%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h " # 日志格式
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456  # ⚠️ 生产环境请修改密码
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    # 如果需要从外部访问PostgreSQL，可以取消注释：
    # ports:
    #   - "5432:5432"
    # ⭐ 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  # redis_data:  # 如果启用Redis持久化，取消注释

# ============================================
# 使用说明
# ============================================
# 1. 备份当前配置：
#    cp docker-compose.yml docker-compose.yml.backup
#
# 2. 替换配置文件：
#    cp docker-compose-optimized.yml docker-compose.yml
#
# 3. 重启服务：
#    docker-compose down
#    docker-compose up -d
#
# 4. 查看日志：
#    docker-compose logs -f new-api
#    docker-compose logs -f postgres
#
# 5. 监控资源使用：
#    docker stats
#
# ============================================
# 性能调优建议
# ============================================
# 根据你的服务器配置调整以下参数：
#
# 轻量应用服务器（2核4GB）：
#   - shared_buffers=256MB
#   - effective_cache_size=1GB
#   - work_mem=8MB
#   - SQL_MAX_OPEN_CONNS=300
#
# 标准服务器（4核8GB）：
#   - shared_buffers=512MB
#   - effective_cache_size=4GB
#   - work_mem=16MB
#   - SQL_MAX_OPEN_CONNS=500
#
# 高性能服务器（8核16GB+）：
#   - shared_buffers=1GB
#   - effective_cache_size=8GB
#   - work_mem=32MB
#   - SQL_MAX_OPEN_CONNS=800
# ============================================
