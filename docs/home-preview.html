<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark Code - 智能网关首页预览</title>
  <style>
    /* ==================== CSS Variables ==================== */
    :root {
      --semi-color-bg-0: #ffffff;
      --semi-color-bg-1: #f8fafc;
      --semi-color-text-0: #1e293b;
      --semi-color-text-2: #64748b;
      --semi-color-text-3: #94a3b8;
      --semi-color-primary: #4f46e5;
      --semi-color-border: #e2e8f0;
    }

    html.dark {
      --semi-color-bg-0: #0f172a;
      --semi-color-bg-1: #1e293b;
      --semi-color-text-0: #f1f5f9;
      --semi-color-text-2: #94a3b8;
      --semi-color-text-3: #64748b;
      --semi-color-primary: #818cf8;
      --semi-color-border: #334155;
    }

    /* ==================== Reset & Base ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ==================== Animation Keyframes ==================== */
    @keyframes float-slow {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -50px) rotate(5deg); }
      66% { transform: translate(-20px, 20px) rotate(-5deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes float-medium {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, 30px) scale(1.1); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes pulse-soft {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradient-xy {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ==================== Container ==================== */
    .home-container {
      width: 100%;
      overflow-x: hidden;
    }

    .home-wrapper {
      width: 100%;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--semi-color-bg-0);
    }

    /* ==================== Dynamic Background Blobs ==================== */
    .home-blob {
      position: absolute;
      filter: blur(80px);
      z-index: 0;
      mix-blend-mode: multiply;
      pointer-events: none;
      display: block;
    }

    html.dark .home-blob {
      mix-blend-mode: screen;
      opacity: 0.3 !important;
    }

    .home-blob-indigo {
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
      top: -100px;
      left: -100px;
      animation: float-slow 12s infinite ease-in-out;
      opacity: 0.7;
    }

    .home-blob-teal {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ccfbf1 0%, #bae6fd 100%);
      bottom: -50px;
      right: -50px;
      animation: float-medium 10s infinite ease-in-out;
      opacity: 0.7;
    }

    .home-blob-purple {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f3e8ff 0%, #ddd6fe 100%);
      top: 20%;
      right: 20%;
      animation: pulse-soft 8s infinite ease-in-out;
      opacity: 0.6;
    }

    /* ==================== Hero Section ==================== */
    .home-hero {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8rem 1rem 4rem;
      position: relative;
      z-index: 10;
    }

    .home-hero-content {
      text-align: center;
      max-width: 56rem;
      margin: 0 auto;
    }

    /* ==================== Badge ==================== */
    .home-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      background-color: rgba(79, 70, 229, 0.08);
      border: 1px solid rgba(79, 70, 229, 0.15);
      color: var(--semi-color-primary);
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
      letter-spacing: 0.025em;
      backdrop-filter: blur(4px);
      cursor: default;
      transition: background-color 0.2s ease;
    }

    .home-badge:hover {
      background-color: rgba(79, 70, 229, 0.12);
    }

    .home-badge-dot {
      position: relative;
      display: flex;
      height: 0.5rem;
      width: 0.5rem;
    }

    .home-badge-dot-inner {
      position: relative;
      display: inline-flex;
      border-radius: 9999px;
      height: 0.5rem;
      width: 0.5rem;
      background-color: var(--semi-color-primary);
    }

    /* ==================== Headline ==================== */
    .home-headline {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--semi-color-text-0);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    @media (min-width: 768px) {
      .home-headline { font-size: 4.5rem; }
    }

    @media (min-width: 1024px) {
      .home-headline { font-size: 5rem; }
    }

    .home-gradient-text {
      background: linear-gradient(270deg, #4f46e5, #0ea5e9, #4f46e5);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-xy 4s linear infinite;
    }

    /* ==================== Subheadline ==================== */
    .home-subheadline {
      font-size: 1.125rem;
      color: var(--semi-color-text-2);
      margin-bottom: 3rem;
      max-width: 42rem;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.75;
    }

    @media (min-width: 768px) {
      .home-subheadline { font-size: 1.25rem; }
    }

    /* ==================== Buttons ==================== */
    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 640px) {
      .home-buttons { flex-direction: row; }
    }

    .home-btn-primary {
      width: 100%;
      max-width: 200px;
      padding: 1rem 2rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: white;
      border: none;
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2), 0 4px 6px -2px rgba(79, 70, 229, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      text-decoration: none;
    }

    @media (min-width: 640px) {
      .home-btn-primary { width: auto; }
    }

    .home-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.3), 0 10px 10px -5px rgba(79, 70, 229, 0.1);
    }

    .home-btn-arrow {
      width: 1rem;
      height: 1rem;
      transition: transform 0.2s ease;
    }

    .home-btn-primary:hover .home-btn-arrow {
      transform: translateX(4px);
    }

    /* Extra Buttons */
    .home-extra-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      align-items: center;
    }

    .home-btn-tertiary {
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      transition: all 0.2s ease;
      background-color: var(--semi-color-bg-1);
      border: 1px solid var(--semi-color-border);
      color: var(--semi-color-text-0);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .home-btn-tertiary:hover {
      transform: translateY(-1px);
      border-color: var(--semi-color-primary);
    }

    .home-btn-tertiary svg {
      width: 1rem;
      height: 1rem;
    }

    /* ==================== Features Section ==================== */
    .home-features {
      margin-top: 6rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      width: 100%;
      max-width: 64rem;
      padding: 0 1rem;
    }

    @media (min-width: 768px) {
      .home-features { grid-template-columns: repeat(3, 1fr); }
    }

    /* Feature Card */
    .home-feature-card {
      background-color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      padding: 2rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.02);
      text-align: center;
      transition: all 0.3s ease;
    }

    html.dark .home-feature-card {
      background-color: rgba(30, 30, 30, 0.6);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .home-feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    html.dark .home-feature-card:hover {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
    }

    /* Feature Icon */
    .home-feature-icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1rem;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .home-feature-card:hover .home-feature-icon {
      transform: scale(1.1);
    }

    .home-feature-icon-indigo {
      background-color: rgba(79, 70, 229, 0.1);
      color: #4f46e5;
    }

    .home-feature-icon-teal {
      background-color: rgba(20, 184, 166, 0.1);
      color: #14b8a6;
    }

    .home-feature-icon-purple {
      background-color: rgba(168, 85, 247, 0.1);
      color: #a855f7;
    }

    .home-feature-icon svg {
      width: 1.5rem;
      height: 1.5rem;
    }

    /* Feature Value */
    .home-feature-value {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--semi-color-text-0);
      margin-bottom: 0.25rem;
    }

    /* Feature Label */
    .home-feature-label {
      font-size: 0.875rem;
      color: var(--semi-color-text-2);
      font-weight: 500;
    }

    /* ==================== Footer ==================== */
    .home-footer {
      padding: 2rem;
      text-align: center;
      color: var(--semi-color-text-3);
      font-size: 0.875rem;
      position: relative;
      z-index: 10;
    }

    /* ==================== Animation Classes ==================== */
    .home-animate-fade-in {
      animation: fade-in-up 0.8s ease-out forwards;
      opacity: 0;
    }

    .home-delay-100 { animation-delay: 100ms; }
    .home-delay-200 { animation-delay: 200ms; }
    .home-delay-300 { animation-delay: 300ms; }
    .home-delay-400 { animation-delay: 400ms; }

    /* ==================== Theme Toggle ==================== */
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      padding: 0.75rem;
      border-radius: 50%;
      background-color: var(--semi-color-bg-1);
      border: 1px solid var(--semi-color-border);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle svg {
      width: 1.25rem;
      height: 1.25rem;
      color: var(--semi-color-text-0);
    }

    .theme-toggle .sun-icon { display: none; }
    .theme-toggle .moon-icon { display: block; }

    html.dark .theme-toggle .sun-icon { display: block; }
    html.dark .theme-toggle .moon-icon { display: none; }
  </style>
</head>
<body>
  <!-- Theme Toggle Button -->
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>

  <div class="home-container">
    <div class="home-wrapper">
      <!-- Dynamic Background Blobs -->
      <div class="home-blob home-blob-indigo"></div>
      <div class="home-blob home-blob-teal"></div>
      <div class="home-blob home-blob-purple"></div>

      <!-- Hero Section -->
      <main class="home-hero">
        <div class="home-hero-content">
          <!-- Badge -->
          <div class="home-animate-fade-in">
            <span class="home-badge">
              <span class="home-badge-dot">
                <span class="home-badge-dot-inner"></span>
              </span>
              全新架构 · 极速体验
            </span>
          </div>

          <!-- Headline -->
          <h1 class="home-headline home-animate-fade-in home-delay-100">
            连接未来的 <br>
            <span class="home-gradient-text">智能网关</span>
          </h1>

          <!-- Subheadline -->
          <p class="home-subheadline home-animate-fade-in home-delay-200">
            Claude Code 与 Codex 的最佳中转服务。<br>
            更低的价格，更稳定的连接，为您的开发之旅保驾护航。
          </p>

          <!-- Primary Button -->
          <div class="home-buttons home-animate-fade-in home-delay-300">
            <a href="#" class="home-btn-primary">
              <span>快速开始</span>
              <svg class="home-btn-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
              </svg>
            </a>
          </div>

          <!-- Extra Buttons -->
          <div class="home-extra-buttons home-animate-fade-in home-delay-300">
            <a href="#" class="home-btn-tertiary">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              使用教程
            </a>
            <a href="#" class="home-btn-tertiary">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
              </svg>
              v1.0.0
            </a>
            <a href="#" class="home-btn-tertiary">
              查看文档
            </a>
          </div>
        </div>

        <!-- Features / Stats Cards -->
        <div class="home-features home-animate-fade-in home-delay-400">
          <!-- Card 1 -->
          <div class="home-feature-card">
            <div class="home-feature-icon home-feature-icon-indigo">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <div class="home-feature-value">99.9%</div>
            <div class="home-feature-label">服务可用性</div>
          </div>

          <!-- Card 2 -->
          <div class="home-feature-card">
            <div class="home-feature-icon home-feature-icon-teal">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div class="home-feature-value">Low Latency</div>
            <div class="home-feature-label">全球加速节点</div>
          </div>

          <!-- Card 3 -->
          <div class="home-feature-card">
            <div class="home-feature-icon home-feature-icon-purple">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
            </div>
            <div class="home-feature-value">Secure</div>
            <div class="home-feature-label">企业级安全防护</div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="home-footer">
        &copy; 2025 Spark Code. All rights reserved.
      </footer>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
    }
  </script>
</body>
</html>
