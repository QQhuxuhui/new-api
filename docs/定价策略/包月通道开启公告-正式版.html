<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包月通道开启公告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .announcement {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 32px 40px;
            text-align: center;
        }

        .header-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            color: #94a3b8;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .header-date {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 12px;
        }

        /* Content */
        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 32px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #f1f5f9;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            margin-right: 12px;
        }

        .section-title {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .section-content {
            color: #475569;
            font-size: 15px;
            line-height: 1.8;
            padding-left: 40px;
        }

        .highlight {
            color: #7c3aed;
            font-weight: 600;
        }

        .price-tag {
            display: inline-block;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #16a34a;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            margin: 0 4px;
        }

        /* Notice Box */
        .notice-box {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border-left: 4px solid #f59e0b;
            border-radius: 0 12px 12px 0;
            padding: 20px 24px;
            margin-top: 32px;
        }

        .notice-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #92400e;
            margin-bottom: 10px;
        }

        .notice-content {
            color: #a16207;
            font-size: 14px;
            line-height: 1.7;
        }

        .notice-date {
            font-weight: 600;
            color: #92400e;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #f1f5f9;
            padding: 24px 40px;
            text-align: center;
        }

        .footer-text {
            color: #94a3b8;
            font-size: 13px;
        }

        .footer-link {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="announcement">
        <!-- Header -->
        <div class="header">
            <div class="header-badge">服务公告</div>
            <h1>包月通道开启</h1>
            <div class="header-date">2025年1月14日</div>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="section">
                <div class="section-title">
                    <span class="section-number">1</span>
                    包月通道重新开启
                </div>
                <div class="section-content">
                    包月订阅通道现已重新开放，单价维持在<span class="price-tag">4毛多/美金</span>的优惠水平。具体套餐详情请前往<span class="highlight">产品定价页面</span>查看。
                </div>
            </div>

            <div class="section">
                <div class="section-title">
                    <span class="section-number">2</span>
                    按量付费优惠升级
                </div>
                <div class="section-content">
                    按量付费优惠力度加大，充值越多折扣越大，最低可享<span class="price-tag">6毛/美金</span>的优惠价格。
                </div>
            </div>

            <!-- Notice -->
            <div class="notice-box">
                <div class="notice-title">
                    <span>📢</span>
                    老用户福利
                </div>
                <div class="notice-content">
                    <span class="notice-date">1月10日至1月14日</span>期间充值的用户，可联系客服按照最新的折扣力度调整账户余额。
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-text">
                如有疑问，请联系客服咨询
            </div>
        </div>
    </div>
</body>
</html>
