<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API服务定价计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 20px;
            padding: 32px 40px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            display: flex;
            gap: 12px;
        }

        .tag {
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 500;
            background: #dcfce7;
            color: #16a34a;
        }

        /* Section */
        .section {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .icon {
            font-size: 24px;
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        .input-group input {
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #334155;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .input-group .unit {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Result Box */
        .result-box {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-radius: 16px;
            padding: 20px 24px;
            text-align: center;
            margin-top: 20px;
        }

        .result-box.warning {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }

        .result-box .label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .result-box .value {
            font-size: 32px;
            font-weight: 800;
            color: #10b981;
        }

        .result-box.warning .value {
            color: #f59e0b;
        }

        /* Package Table */
        .package-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .package-table th {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            padding: 16px 14px;
            text-align: center;
            font-weight: 600;
            color: #475569;
        }

        .package-table th:first-child {
            text-align: left;
            padding-left: 24px;
            border-radius: 12px 0 0 12px;
        }

        .package-table th:last-child {
            border-radius: 0 12px 12px 0;
        }

        .package-table td {
            padding: 16px 14px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .package-table td:first-child {
            text-align: left;
            padding-left: 24px;
        }

        .package-table tbody tr:hover td {
            background: #fafafa;
        }

        .package-table input {
            width: 100px;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            text-align: center;
        }

        .package-table input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .package-name {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .package-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        .badge-base { background: #f1f5f9; color: #64748b; }
        .badge-rec { background: #f3e8ff; color: #7c3aed; }
        .badge-pro { background: #dbeafe; color: #2563eb; }
        .badge-vip { background: #fef3c7; color: #d97706; }

        /* Profit Display */
        .profit-display {
            font-weight: 700;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            min-width: 80px;
        }

        .profit-good {
            background: #dcfce7;
            color: #16a34a;
        }

        .profit-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .profit-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        /* Risk Display */
        .risk-positive {
            color: #16a34a;
            font-weight: 600;
        }

        .risk-negative {
            color: #dc2626;
            font-weight: 600;
        }

        /* Suggestion Display */
        .suggestion-value {
            font-weight: 700;
            color: #7c3aed;
            font-size: 16px;
        }

        .suggestion-same {
            color: #64748b;
            font-size: 14px;
        }

        /* Summary Bar */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 24px;
        }

        .summary-item {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .summary-label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 24px;
            font-weight: 700;
        }

        .summary-value.green { color: #4ade80; }
        .summary-value.yellow { color: #fbbf24; }
        .summary-value.blue { color: #60a5fa; }
        .summary-value.purple { color: #c4b5fd; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 0 0;
            color: #64748b;
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .input-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .summary-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .input-grid {
                grid-template-columns: 1fr;
            }
            .summary-bar {
                grid-template-columns: 1fr;
            }
            .package-table {
                font-size: 13px;
            }
            .package-table input {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧮 API服务定价计算器</h1>
            <div class="badge">
                <span class="tag">实时计算</span>
            </div>
        </div>

        <!-- Cost Input Section -->
        <div class="section">
            <div class="section-title">
                <span class="icon">💰</span>
                成本参数配置
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label>订阅渠道成本</label>
                    <input type="number" id="subscriptionCost" value="0.14" step="0.01" min="0">
                    <span class="unit">元/美金</span>
                </div>
                <div class="input-group">
                    <label>按量渠道成本</label>
                    <input type="number" id="payAsYouGoCost" value="0.42" step="0.01" min="0">
                    <span class="unit">元/美金</span>
                </div>
                <div class="input-group">
                    <label>订阅可用率</label>
                    <input type="number" id="subscriptionRate" value="60" step="1" min="0" max="100">
                    <span class="unit">%</span>
                </div>
                <div class="input-group">
                    <label>目标毛利率</label>
                    <input type="number" id="targetMargin" value="35" step="1" min="0" max="100">
                    <span class="unit">%</span>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="result-box">
                    <div class="label">📌 综合混合成本</div>
                    <div class="value" id="mixedCostDisplay">0.252 元/美金</div>
                </div>
                <div class="result-box warning">
                    <div class="label">⚠️ 按量兜底成本（订阅失效时）</div>
                    <div class="value" id="fallbackCostDisplay">0.42 元/美金</div>
                </div>
            </div>
        </div>

        <!-- Package Configuration Section -->
        <div class="section">
            <div class="section-title">
                <span class="icon">📦</span>
                套餐配置与分析
            </div>
            <table class="package-table">
                <thead>
                    <tr>
                        <th style="width: 180px;">产品</th>
                        <th>售价(元)</th>
                        <th>额度(美金)</th>
                        <th>单价(元/美金)</th>
                        <th>当前毛利率</th>
                        <th>订阅失效盈亏</th>
                        <th>建议售价</th>
                    </tr>
                </thead>
                <tbody id="packageTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>

        <!-- Summary Bar -->
        <div class="summary-bar">
            <div class="summary-item">
                <div class="summary-label">混合成本</div>
                <div class="summary-value green" id="summaryMixedCost">0.252元</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">毛利率区间</div>
                <div class="summary-value yellow" id="summaryMarginRange">28%~50%</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">风险套餐数</div>
                <div class="summary-value blue" id="summaryRiskCount">4个</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">需调价套餐</div>
                <div class="summary-value purple" id="summaryAdjustCount">3个</div>
            </div>
        </div>

        <div class="footer">
            定价计算器 · 实时分析上游成本变化对套餐毛利的影响
        </div>
    </div>

    <script>
        // 套餐配置
        const packages = [
            { id: 'payg', name: '按量付费', badge: '', badgeClass: '', price: 0.50, quota: null, isPayAsYouGo: true },
            { id: 'basic', name: '基础月卡', badge: '入门', badgeClass: 'badge-base', price: 69, quota: 180 },
            { id: 'standard', name: '标准月卡', badge: '⭐ 推荐', badgeClass: 'badge-rec', price: 129, quota: 350 },
            { id: 'pro', name: '专业月卡', badge: '专业', badgeClass: 'badge-pro', price: 249, quota: 700 },
            { id: 'flagship', name: '旗舰月卡', badge: '👑 大客户', badgeClass: 'badge-vip', price: 449, quota: 1300 }
        ];

        // 初始化表格
        function initTable() {
            const tbody = document.getElementById('packageTableBody');
            tbody.innerHTML = packages.map(pkg => {
                if (pkg.isPayAsYouGo) {
                    return `
                        <tr data-id="${pkg.id}">
                            <td>
                                <div class="package-name">${pkg.name}</div>
                            </td>
                            <td>
                                <input type="number" class="price-input" data-id="${pkg.id}" value="${pkg.price}" step="0.01" min="0">
                                <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">元/美金</div>
                            </td>
                            <td style="color: #94a3b8;">不限</td>
                            <td class="unit-price">-</td>
                            <td class="margin-display"></td>
                            <td class="risk-display"></td>
                            <td class="suggestion-display"></td>
                        </tr>
                    `;
                }
                return `
                    <tr data-id="${pkg.id}">
                        <td>
                            <div class="package-name">
                                ${pkg.name}
                                ${pkg.badge ? `<span class="package-badge ${pkg.badgeClass}">${pkg.badge}</span>` : ''}
                            </div>
                        </td>
                        <td><input type="number" class="price-input" data-id="${pkg.id}" value="${pkg.price}" step="1" min="0"></td>
                        <td><input type="number" class="quota-input" data-id="${pkg.id}" value="${pkg.quota}" step="10" min="0"></td>
                        <td class="unit-price"></td>
                        <td class="margin-display"></td>
                        <td class="risk-display"></td>
                        <td class="suggestion-display"></td>
                    </tr>
                `;
            }).join('');

            // 绑定事件
            document.querySelectorAll('.price-input, .quota-input').forEach(input => {
                input.addEventListener('input', calculate);
            });
        }

        // 计算
        function calculate() {
            const subscriptionCost = parseFloat(document.getElementById('subscriptionCost').value) || 0;
            const payAsYouGoCost = parseFloat(document.getElementById('payAsYouGoCost').value) || 0;
            const subscriptionRate = parseFloat(document.getElementById('subscriptionRate').value) || 0;
            const targetMargin = parseFloat(document.getElementById('targetMargin').value) || 0;

            // 混合成本
            const mixedCost = subscriptionCost * (subscriptionRate / 100) + payAsYouGoCost * (1 - subscriptionRate / 100);

            // 更新显示
            document.getElementById('mixedCostDisplay').textContent = `${mixedCost.toFixed(3)} 元/美金`;
            document.getElementById('fallbackCostDisplay').textContent = `${payAsYouGoCost.toFixed(2)} 元/美金`;
            document.getElementById('summaryMixedCost').textContent = `${mixedCost.toFixed(3)}元`;

            let margins = [];
            let riskCount = 0;
            let adjustCount = 0;

            packages.forEach(pkg => {
                const row = document.querySelector(`tr[data-id="${pkg.id}"]`);
                const priceInput = row.querySelector('.price-input');
                const price = parseFloat(priceInput.value) || 0;

                let unitPrice, margin, riskProfitLoss, suggestedPrice;

                if (pkg.isPayAsYouGo) {
                    // 按量付费
                    unitPrice = price;
                    margin = price > 0 ? ((price - mixedCost) / price) * 100 : 0;
                    riskProfitLoss = price - payAsYouGoCost;
                    suggestedPrice = mixedCost / (1 - targetMargin / 100);

                    row.querySelector('.unit-price').textContent = `${unitPrice.toFixed(2)}`;
                } else {
                    // 月卡
                    const quotaInput = row.querySelector('.quota-input');
                    const quota = parseFloat(quotaInput.value) || 0;

                    unitPrice = quota > 0 ? price / quota : 0;
                    margin = unitPrice > 0 ? ((unitPrice - mixedCost) / unitPrice) * 100 : 0;
                    riskProfitLoss = unitPrice - payAsYouGoCost;
                    suggestedPrice = quota * mixedCost / (1 - targetMargin / 100);

                    row.querySelector('.unit-price').textContent = unitPrice.toFixed(2);
                }

                margins.push(margin);

                // 毛利率显示
                const marginDisplay = row.querySelector('.margin-display');
                let marginClass = 'profit-good';
                if (margin < targetMargin) {
                    marginClass = 'profit-warning';
                    adjustCount++;
                }
                if (margin < 20) {
                    marginClass = 'profit-danger';
                }
                marginDisplay.innerHTML = `<span class="profit-display ${marginClass}">${margin.toFixed(1)}%</span>`;

                // 风险显示
                const riskDisplay = row.querySelector('.risk-display');
                if (riskProfitLoss >= 0) {
                    riskDisplay.innerHTML = `<span class="risk-positive">+${riskProfitLoss.toFixed(2)}</span>`;
                } else {
                    riskDisplay.innerHTML = `<span class="risk-negative">${riskProfitLoss.toFixed(2)}</span>`;
                    riskCount++;
                }

                // 建议售价
                const suggestionDisplay = row.querySelector('.suggestion-display');
                const currentPrice = pkg.isPayAsYouGo ? price : price;
                if (margin >= targetMargin) {
                    suggestionDisplay.innerHTML = `<span class="suggestion-same">当前合理</span>`;
                } else {
                    if (pkg.isPayAsYouGo) {
                        suggestionDisplay.innerHTML = `<span class="suggestion-value">${suggestedPrice.toFixed(2)}</span>`;
                    } else {
                        suggestionDisplay.innerHTML = `<span class="suggestion-value">${Math.ceil(suggestedPrice)}元</span>`;
                    }
                }
            });

            // 更新汇总
            const minMargin = Math.min(...margins);
            const maxMargin = Math.max(...margins);
            document.getElementById('summaryMarginRange').textContent = `${minMargin.toFixed(0)}%~${maxMargin.toFixed(0)}%`;
            document.getElementById('summaryRiskCount').textContent = `${riskCount}个`;
            document.getElementById('summaryAdjustCount').textContent = `${adjustCount}个`;
        }

        // 绑定成本参数输入事件
        document.querySelectorAll('#subscriptionCost, #payAsYouGoCost, #subscriptionRate, #targetMargin').forEach(input => {
            input.addEventListener('input', calculate);
        });

        // 初始化
        initTable();
        calculate();
    </script>
</body>
</html>
