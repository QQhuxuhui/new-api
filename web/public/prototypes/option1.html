<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Code - Option 1: Minimalist Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .blur-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-x-hidden relative min-h-screen flex flex-col">

    <!-- Background Blobs -->
    <div class="blur-blob bg-indigo-300 w-96 h-96 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="blur-blob bg-teal-200 w-80 h-80 rounded-full bottom-0 right-0 translate-x-1/3 translate-y-1/3 animation-delay-2000"></div>

    <!-- Navigation (Simplified) -->
    <nav class="w-full py-4 px-6 fixed top-0 z-50 glass-nav border-b border-slate-100">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="font-bold text-xl tracking-tight text-indigo-600">Spark Code</div>
            <div class="space-x-4 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-indigo-600 transition">首页</a>
                <a href="#" class="hover:text-indigo-600 transition">价格</a>
                <a href="#" class="hover:text-indigo-600 transition">关于</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="flex-grow flex flex-col justify-center items-center px-4 mt-20">
        <div class="text-center max-w-3xl mx-auto">
            <span class="inline-block py-1 px-3 rounded-full bg-indigo-50 text-indigo-600 text-xs font-semibold mb-6 tracking-wide">
                全新架构，极速体验
            </span>
            <h1 class="text-5xl md:text-6xl font-bold tracking-tight text-slate-900 mb-6 leading-tight">
                连接未来的 <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-teal-400">智能网关</span>
            </h1>
            <p class="text-lg md:text-xl text-slate-500 mb-10 max-w-2xl mx-auto leading-relaxed">
                Claude Code 与 Codex 的最佳中转服务。更低的价格，更稳定的连接，为您的开发之旅保驾护航。
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button class="w-full sm:w-auto px-8 py-4 bg-indigo-600 text-white rounded-full font-semibold shadow-lg hover:bg-indigo-700 hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200">
                    快速开始
                </button>
                <button class="w-full sm:w-auto px-8 py-4 bg-white text-slate-700 border border-slate-200 rounded-full font-medium hover:bg-slate-50 hover:border-slate-300 transition-all duration-200 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    获取密钥
                </button>
            </div>
        </div>

        <!-- Simple Features / Stats -->
        <div class="mt-24 grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl border-t border-slate-200 pt-12">
            <div class="text-center">
                <div class="text-3xl font-bold text-slate-800 mb-1">99.9%</div>
                <div class="text-sm text-slate-500">服务可用性</div>
            </div>
            <div class="text-center border-l-0 md:border-l border-r-0 md:border-r border-slate-200">
                <div class="text-3xl font-bold text-slate-800 mb-1">Low Latency</div>
                <div class="text-sm text-slate-500">全球加速节点</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-slate-800 mb-1">Secure</div>
                <div class="text-sm text-slate-500">企业级安全防护</div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-slate-400 text-sm">
        &copy; 2025 Spark Code. All rights reserved.
    </footer>
</body>
</html>
