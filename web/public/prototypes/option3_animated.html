<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Code - Option 3: Cyberpunk Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050b14; color: #e2e8f0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar for Terminal */
        .terminal-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-scroll::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        /* Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 25px rgba(99, 102, 241, 0.5); border-color: rgba(129, 140, 248, 0.8); }
        }
        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .animate-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(99, 102, 241, 0.1), transparent);
            animation: scanline 3s linear infinite;
            pointer-events: none;
        }

        .grid-bg {
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-move 20s linear infinite;
        }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #2dd4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradient-shift 5s ease infinite;
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .terminal-cursor::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: #2dd4bf;
            margin-left: 2px;
        }

        .cyber-btn {
            position: relative;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
        }
        .cyber-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent 5%, rgba(255,255,255,0.1) 5%, rgba(255,255,255,0.1) 10%, transparent 10%);
            background-size: 200% 200%;
            transition: background-position 0.3s;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col grid-bg relative selection:bg-indigo-500/30 selection:text-indigo-200">

    <!-- Vignette & ambient light -->
    <div class="fixed inset-0 bg-radial-gradient pointer-events-none z-0" style="background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15), transparent 60%);"></div>

    <!-- Header -->
    <header class="w-full py-5 px-8 flex justify-between items-center border-b border-slate-800/60 backdrop-blur-md sticky top-0 z-50 bg-slate-950/80">
        <div class="text-xl font-bold tracking-wider text-white flex items-center gap-2 group cursor-pointer">
            <div class="w-8 h-8 bg-indigo-500/20 rounded border border-indigo-500/50 flex items-center justify-center text-indigo-400 font-mono group-hover:bg-indigo-500 group-hover:text-white transition-all">
                &gt;_
            </div>
            <span class="text-slate-200 group-hover:text-white transition">Spark<span class="text-indigo-400">Code</span></span>
        </div>
        <div class="flex gap-4">
             <a href="/login" class="cyber-btn bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-2 px-6 tracking-widest uppercase">
                Login
            </a>
        </div>
    </header>

    <!-- Main Hero -->
    <main class="flex-grow flex flex-col items-center justify-center text-center px-4 py-16 relative z-10">
        
        <div class="max-w-5xl mx-auto w-full flex flex-col items-center">
            <!-- Status Badge -->
            <div class="mb-8 inline-flex items-center gap-3 px-4 py-2 rounded-sm bg-slate-900/80 border border-indigo-500/30 text-xs font-mono text-indigo-300 shadow-[0_0_10px_rgba(99,102,241,0.1)]">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-teal-500"></span>
                </span>
                SYSTEM_ONLINE :: LATENCY 24ms
            </div>
            
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-white mb-6 leading-tight">
                ACCESS THE <br>
                <span class="gradient-text">INTELLIGENCE MATRIX</span>
            </h1>
            
            <p class="text-lg text-slate-400 mb-10 max-w-2xl mx-auto leading-relaxed font-light">
                High-performance API gateway for Claude, GPT-4, and open-source models. <br>
                <span class="text-indigo-400 font-mono text-sm opacity-80">Encryption: AES-256 // Uptime: 99.99%</span>
            </p>

            <div class="flex flex-col sm:flex-row gap-6 justify-center items-center mb-20">
                <button class="cyber-btn px-10 py-4 bg-indigo-600 text-white font-bold text-lg tracking-wide group">
                    <span class="group-hover:text-indigo-100">INITIALIZE</span>
                </button>
                <button class="cyber-btn px-10 py-4 bg-transparent border border-slate-600 text-slate-300 hover:border-white hover:text-white font-mono text-sm uppercase">
                    Read_Docs()
                </button>
            </div>

            <!-- Live Terminal Effect -->
            <div class="w-full max-w-4xl relative group perspective-1000">
                <!-- Glow behind -->
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-600 to-teal-600 rounded-lg blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                
                <!-- Terminal Window -->
                <div class="relative bg-slate-950 rounded-lg border border-slate-800 overflow-hidden shadow-2xl">
                    <!-- Title Bar -->
                    <div class="bg-slate-900 px-4 py-2 flex items-center justify-between border-b border-slate-800">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                        </div>
                        <div class="text-xs font-mono text-slate-500">root@spark-gateway:~</div>
                        <div class="w-10"></div>
                    </div>

                    <!-- Terminal Content -->
                    <div class="p-6 h-64 text-left font-mono text-sm overflow-y-auto terminal-scroll bg-black/90" id="terminal-content">
                        <div class="animate-scanline"></div>
                        <!-- Content injected by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Terminal Script -->
    <script>
        const logs = [
            { text: "> Initializing secure connection...", color: "text-slate-400", delay: 0 },
            { text: "> Verifying API keys...", color: "text-yellow-400", delay: 800 },
            { text: "[SUCCESS] Authentication verified.", color: "text-green-400", delay: 1600 },
            { text: "> Routing request to claude-3-opus...", color: "text-slate-300", delay: 2400 },
            { text: "  Payload: { max_tokens: 4096, temp: 0.7 }", color: "text-slate-500", delay: 2600 },
            { text: "[STREAM] Receiving packets...", color: "text-blue-400", delay: 3200 },
            { text: "  Packet 1/45 received (12ms)", color: "text-slate-600", delay: 3500 },
            { text: "  Packet 2/45 received (15ms)", color: "text-slate-600", delay: 3600 },
            { text: "  Packet 3/45 received (11ms)", color: "text-slate-600", delay: 3700 },
            { text: "[COMPLETE] Request processed in 0.45s", color: "text-green-400", delay: 4500 },
            { text: "> Standing by for next instruction...", color: "text-indigo-400", delay: 5200 }
        ];

        const terminal = document.getElementById('terminal-content');
        let currentIndex = 0;

        function addLog(log) {
            const line = document.createElement('div');
            line.className = `mb-1 ${log.color} opacity-0 transform translate-x-[-10px] transition-all duration-300`;
            line.textContent = log.text;
            terminal.appendChild(line);

            // Trigger animation
            requestAnimationFrame(() => {
                line.classList.remove('opacity-0', 'translate-x-[-10px]');
            });

            // Auto scroll
            terminal.scrollTop = terminal.scrollHeight;
        }

        function runSequence() {
            terminal.innerHTML = '<div class="animate-scanline"></div>'; // Reset but keep scanline
            currentIndex = 0;
            
            logs.forEach(log => {
                setTimeout(() => {
                    addLog(log);
                }, log.delay);
            });

            // Add cursor at the end
            setTimeout(() => {
                const cursorLine = document.createElement('div');
                cursorLine.className = "mt-2 terminal-cursor text-slate-300";
                cursorLine.innerHTML = '<span class="text-indigo-500">root@spark-gateway</span>:<span class="text-blue-500">~</span>$ ';
                terminal.appendChild(cursorLine);
                terminal.scrollTop = terminal.scrollHeight;
            }, logs[logs.length - 1].delay + 500);
        }

        // Start loop
        runSequence();
        setInterval(runSequence, 8000); // Restart every 8s
    </script>
</body>
</html>
